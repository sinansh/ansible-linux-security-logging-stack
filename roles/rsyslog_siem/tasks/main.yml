---
- name: Install rsyslog
  package:
    name: rsyslog
    state: present
  become: true

- name: Ensure ACL package is installed
  package:
    name: acl
    state: present
  become: true

# ── Auditd log erişimi ──────────────────────────────────────────────────────
- name: Grant syslog user access to audit directory
  acl:
    path: /var/log/audit
    entity: syslog
    etype: user
    permissions: rx
    state: present
  become: true

- name: Check if audit.log exists
  stat:
    path: /var/log/audit/audit.log
  register: audit_log_stat
  become: true

- name: Grant syslog user read access to audit.log
  acl:
    path: /var/log/audit/audit.log
    entity: syslog
    etype: user
    permissions: r
    state: present
  become: true
  when: audit_log_stat.stat.exists

# ── Sysmon log erişimi ──────────────────────────────────────────────────────
# sysmon_linux rolü bu dizini ve dosyayı oluşturur; biz yalnızca ACL veriyoruz.
- name: Check if sysmon log directory exists
  stat:
    path: "{{ sysmon_log_path | dirname }}"
  register: sysmon_log_dir_stat
  become: true

- name: Grant syslog user access to sysmon log directory
  acl:
    path: "{{ sysmon_log_path | dirname }}"
    entity: syslog
    etype: user
    permissions: rx
    state: present
  become: true
  when: sysmon_log_dir_stat.stat.exists

- name: Check if sysmon log file exists
  stat:
    path: "{{ sysmon_log_path }}"
  register: sysmon_log_stat
  become: true

- name: Grant syslog user read access to sysmon.log
  acl:
    path: "{{ sysmon_log_path }}"
    entity: syslog
    etype: user
    permissions: r
    state: present
  become: true
  when: sysmon_log_stat.stat.exists

# ── rsyslog konfigürasyonu ──────────────────────────────────────────────────
- name: Deploy rsyslog SIEM forwarding config
  template:
    src: rsyslog-siem.conf.j2
    dest: /etc/rsyslog.d/99-siem.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart rsyslog
  become: true

- name: Ensure rsyslog is enabled and started
  systemd:
    name: rsyslog
    enabled: true
    state: started
  become: true
