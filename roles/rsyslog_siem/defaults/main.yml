---
# Defaults for rsyslog_siem

# SIEM Connection Details
siem_host: "127.0.0.1"
siem_port: 514
siem_protocol: "udp"

# Queue Configuration
rsyslog_queue_enabled: true
rsyslog_queue_maxchk: "1g"

# Sysmon dedicated log file — sysmon_linux rolüyle senkron olmalı
sysmon_log_path: "/var/log/sysmon/sysmon.log"
