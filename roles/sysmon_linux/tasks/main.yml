---
- name: Include OS-specific installation tasks
  include_tasks: "install-{{ ansible_facts['os_family'] }}.yml"

- name: Ensure Sysmon log directory exists
  file:
    path: "{{ sysmon_log_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: '0750'
  become: true

- name: Ensure Sysmon log file exists with correct permissions
  file:
    path: "{{ sysmon_log_path }}"
    state: touch
    owner: root
    group: root
    mode: '0640'
    modification_time: preserve
    access_time: preserve
  become: true

- name: Deploy Sysmon logrotate configuration
  template:
    src: sysmon-logrotate.j2
    dest: /etc/logrotate.d/sysmon
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Ensure journald drop-in directory exists
  file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Deploy journald size and retention limits
  template:
    src: journald-limits.conf.j2
    dest: /etc/systemd/journald.conf.d/99-size-limits.conf
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: Restart journald

- name: Vacuum journal to enforce new size limits immediately
  command: journalctl --vacuum-size={{ journald_system_max_use }} --vacuum-time={{ journald_max_retention_sec }}
  become: true
  changed_when: false

- name: Deploy custom Sysmon systemd unit from template
  template:
    src: sysmon.service.j2
    dest: /etc/systemd/system/sysmon.service
    owner: root
    group: root
    mode: '0644'
  become: true
  notify: Reload systemd

- name: Ensure Sysmon config directory exists
  file:
    path: "{{ sysmon_config_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Deploy Sysmon configuration
  template:
    src: sysmon-config.xml.j2
    dest: "{{ sysmon_config_path }}"
    owner: root
    group: root
    mode: '0644'
  become: true
  register: sysmon_config_file

- name: Check if Sysmon service is active
  command: systemctl is-active sysmon
  register: sysmon_service_status
  failed_when: false
  changed_when: false
  become: true

- name: Install Sysmon configuration (first-time setup)
  command: sysmon -i {{ sysmon_config_path }} -accepteula
  become: true
  when: (sysmon_service_status.rc | default(1)) != 0
  changed_when: true

- name: Update Sysmon configuration (config change detected)
  command: sysmon -c {{ sysmon_config_path }}
  become: true
  when:
    - (sysmon_service_status.rc | default(1)) == 0
    - sysmon_config_file.changed
  changed_when: true

- name: Ensure Sysmon service is started and enabled
  systemd:
    name: sysmon
    state: started
    enabled: true
    daemon_reload: true
  become: true
