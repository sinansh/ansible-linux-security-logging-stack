---
# Defaults for sysmon_linux

# Package URLs can be overridden if hosting internally
sysmon_config_path: "/etc/sysmon/sysmon-config.xml"

# Dedicated log file (bypasses journald — prevents disk bloat)
sysmon_log_path: "/var/log/sysmon/sysmon.log"

# Logrotate: kaç günlük log tutulsun
sysmon_log_rotate_days: 1

# journald stderr rate limiting (servis başına)
# 30 saniyede en fazla 50 satır — crash loop'larında journal şişmesini önler
sysmon_journal_rate_interval_sec: 30
sysmon_journal_rate_burst: 50

# NetworkConnect exclusion: destination IP listesi
# Ortama göre group_vars/all.yml veya host_vars'tan override edilebilir
sysmon_excluded_destination_ips: []

# NetworkConnect exclusion: image (binary path) listesi
# Zabbix, Kubernetes bileşenleri gibi gürültülü process'leri buraya ekle
sysmon_excluded_network_images: []

