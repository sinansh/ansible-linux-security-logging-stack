---
# augenrules --load kuralları çalışan kernel'e yükler; restart gerekmez.
# Restart yalnızca auditd.conf değiştiğinde gereklidir.
- name: Reload audit rules
  command: augenrules --load
  become: true
  changed_when: true

- name: Restart auditd
  systemd:
    name: auditd
    state: restarted
  become: true
