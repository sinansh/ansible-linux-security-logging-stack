
# SIEM destination
siem_host: "192.168.42.129"
siem_port: 514
siem_protocol: "tcp"

# Sysmon config path
sysmon_config_path: "/etc/sysmon/sysmon-config.xml"

# Sysmon dedicated log file (journald'ı bypass eder, disk şişmesini önler)
sysmon_log_path: "/var/log/sysmon/sysmon.log"

# Candidate service names (depending on distribution)
sysmon_service_candidates:
  - sysmon
  - sysmonforlinux

# Audit rules path
audit_rules_path: "/etc/audit/rules.d/99-siem.rules"

# Sysmon NetworkConnect exclusion IP listesi
# Zabbix, monitoring vb. araçların hedef IP'lerini buraya ekle
sysmon_excluded_destination_ips:
  - "192.168.42.129"

# Sysmon NetworkConnect exclusion image listesi
# NetworkConnect üretmesini istemediğimiz process binary path'leri
sysmon_excluded_network_images:
  # Zabbix
  - "/usr/sbin/zabbix_agent2"
  - "/usr/sbin/zabbix_agentd"
  # Kubernetes control plane & node bileşenleri
  - "/usr/local/bin/kube-apiserver"
  - "/usr/local/bin/kube-controller-manager"
  - "/usr/local/bin/kube-scheduler"
  - "/usr/local/bin/kube-proxy"
  - "/usr/bin/kubelet"
  # Container runtime
  - "/usr/bin/containerd"
  - "/usr/local/bin/containerd"
  - "/usr/bin/containerd-shim-runc-v2"
